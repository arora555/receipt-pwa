<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Scanner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body { margin:0; font-family:Arial; background:black; color:white; text-align:center; }
.container { display:flex; flex-direction:column; justify-content:center; height:100vh; gap:20px; }
button { padding:20px; font-size:18px; background:white; color:black; border:none; cursor:pointer; width:80%; margin:0 auto; }
#history { display:none; padding:20px; }
table { width:100%; border-collapse:collapse; color:white; }
th, td { border-bottom:1px solid white; padding:8px; text-align:center; }
</style>
</head>
<body>

<div class="container" id="home">
  <button onclick="capture()">Capture Receipt</button>
  <button onclick="showHistory()">View History</button>
</div>

<div id="history">
  <h2>History</h2>
  <table id="historyTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Daily Total</th>
        <th>Cumulative</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <button onclick="goHome()">Back</button>
</div>

<input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
// Metadata storage
let receipts = JSON.parse(localStorage.getItem("receipts") || "[]");

// Capture
function capture() {
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", async function() {
  const file = this.files[0];
  if (!file) return;

  // OCR
  const result = await Tesseract.recognize(file, 'eng');
  const text = result.data.text;

  const date = extractDate(text);
  const total = parseFloat(extractTotal(text).replace(/,/g,'')) || 0;

  // Upload to OneDrive
  uploadToOneDrive(file, `Receipts/${file.name}`);

  // Save metadata locally
  receipts.push({ date, total });
  localStorage.setItem("receipts", JSON.stringify(receipts));

  alert("Saved!");
});

// Extraction
function extractDate(text) {
  const match = text.match(/\d{2}\/\d{2}\/\d{2,4}/);
  return match ? match[0] : new Date().toLocaleDateString();
}

function extractTotal(text) {
  const match = text.match(/total[^0-9]*([\d,.]+)/i);
  return match ? match[1] : "0";
}

// OneDrive Upload (requires OAuth token)
async function uploadToOneDrive(file, path) {
  const token = localStorage.getItem("ms_token"); // Store after OAuth login
  if (!token) {
    alert("Please authenticate OneDrive first.");
    return;
  }
  try {
    await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${path}:/content`, {
      method: "PUT",
      headers: { "Authorization": `Bearer ${token}` },
      body: file
    });
  } catch(e) {
    console.error("OneDrive upload failed:", e);
  }
}

// UI
function showHistory() {
  document.getElementById("home").style.display = "none";
  document.getElementById("history").style.display = "block";

  const tbody = document.querySelector("#historyTable tbody");
  tbody.innerHTML = "";

  let cumulative = 0;
  receipts.forEach(r => {
    cumulative += r.total;
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${r.date}</td><td>${r.total.toFixed(2)}</td><td>${cumulative.toFixed(2)}</td>`;
    tbody.appendChild(tr);
  });
}

function goHome() {
  document.getElementById("home").style.display = "flex";
  document.getElementById("history").style.display = "none";
}

// Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
