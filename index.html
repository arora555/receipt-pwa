<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Scanner</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
}
.container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  gap: 20px;
}
button {
  padding: 20px;
  font-size: 18px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  width: 80%;
  margin: 0 auto;
}
#history {
  display: none;
  padding: 20px;
}
.entry {
  border-bottom: 1px solid white;
  padding: 10px;
}
img {
  max-width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container" id="home">
  <button onclick="capture()">Capture Receipt</button>
  <button onclick="showHistory()">View History</button>
</div>

<div id="history">
  <h2>History</h2>
  <div id="list"></div>
  <button onclick="goHome()">Back</button>
</div>

<input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
// IndexedDB setup
let db;
const request = indexedDB.open("ReceiptsDB", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("receipts", { autoIncrement: true });
};

request.onsuccess = e => db = e.target.result;

// Capture
function capture() {
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", async function() {
  const file = this.files[0];
  if (!file) return;

  const imgURL = URL.createObjectURL(file);

  const result = await Tesseract.recognize(file, 'eng');
  const text = result.data.text;

  const date = extractDate(text);
  const total = extractTotal(text);
  const tax = extractTax(text);

  saveReceipt({ date, total, tax, img: imgURL });
  alert("Saved!");
});

// Extraction logic (simple regex)
function extractDate(text) {
  const match = text.match(/\d{2}\/\d{2}\/\d{2,4}/);
  return match ? match[0] : "N/A";
}

function extractTotal(text) {
  const match = text.match(/total[^0-9]*([\d,.]+)/i);
  return match ? match[1] : "N/A";
}

function extractTax(text) {
  const match = text.match(/(tax|hst|gst)[^0-9]*([\d,.]+)/i);
  return match ? match[2] : "N/A";
}

// Save to DB
function saveReceipt(data) {
  const tx = db.transaction("receipts", "readwrite");
  const store = tx.objectStore("receipts");
  store.add(data);
}

// UI navigation
function showHistory() {
  document.getElementById("home").style.display = "none";
  document.getElementById("history").style.display = "block";
  loadHistory();
}

function goHome() {
  document.getElementById("home").style.display = "flex";
  document.getElementById("history").style.display = "none";
}

// Load history
function loadHistory() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const tx = db.transaction("receipts", "readonly");
  const store = tx.objectStore("receipts");
  const request = store.openCursor();

  request.onsuccess = e => {
    const cursor = e.target.result;
    if (cursor) {
      const item = cursor.value;

      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <div>Date: ${item.date}</div>
        <div>Total: ${item.total}</div>
        <div>Tax: ${item.tax}</div>
        <img src="${item.img}">
      `;

      list.appendChild(div);
      cursor.continue();
    }
  };
}

// Register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
