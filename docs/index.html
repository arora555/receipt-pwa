<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Receipt Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
</head>
<body>

  <h1>Receipt Tracker</h1>

  <div id="mainMenu">
    <button class="liquid-btn" id="captureBtn">Capture Receipt</button>
    <button class="liquid-btn" id="viewBtn">View Transactions</button>
  </div>

  <!-- Hidden file input triggers native camera -->
  <input type="file" accept="image/*" capture="environment" id="cameraInput" class="hidden">

  <!-- Transactions Section -->
  <div id="transactionsSection" class="hidden">
    <button class="liquid-btn" id="backToMenuBtn">Back</button>
    <h2>Transaction History</h2>
    <ul id="list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
